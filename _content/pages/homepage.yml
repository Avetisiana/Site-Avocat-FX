about_p1: "Maître **François-Xavier LAPERONNIE** est avocat inscrit au barreau d'Angoulême depuis plus de dix-sept ans. Diplômé de l'École de Formation du Barreau de Paris, il a forgé une expertise de terrain au sein de cabinets reconnus avant de créer sa propre structure."
about_p2: "Son cabinet, situé au cœur d'Angoulême, est fondé sur l'écoute, la rigueur et une **stratégie juridique sur mesure**. Chaque dossier est traité avec la plus grande attention, qu'il s'agisse d'un particulier, d'un chef d'entreprise ou d'une société de grande envergure."
about_p3: "Convaincu que le droit est avant tout un outil au service des personnes, il s'engage à apporter des **solutions concrètes, efficaces et adaptées** aux enjeux de ses clients — en toutes circonstances."

quote_text: "La justice n'est pas un droit acquis — elle se conquiert avec intelligence, méthode et un engagement sans faille envers ceux qui nous font confiance."

exp_penal_title: "Droit Pénal"
exp_penal_desc: "Défense pénale devant toutes les juridictions. Assistance dès la garde à vue, tout au long de l'instruction et jusqu'au jugement — une présence constante à chaque étape."
exp_penal_tags: "Crimes · Délits · Contraventions · Victimes · Appel"
exp_famille_title: "Droit de la Famille"
exp_famille_desc: "Accompagnement humain et rigoureux dans toutes les procédures familiales. Divorce, séparation, garde d'enfants, pension alimentaire, successions et régimes matrimoniaux."
exp_famille_tags: "Divorce · Garde · Succession · Adoption · PACS"
exp_crypto_title: "Cryptomonnaies"
exp_crypto_desc: "Expertise de pointe en droit des actifs numériques. Litiges liés aux cryptomonnaies, arnaques et fraudes blockchain, saisies d'actifs et contentieux avec les plateformes d'échange."
exp_crypto_tags: "Bitcoin · NFT · Fraudes · DeFi · Saisies numériques"

testi1_text: "J'ai fait appel à Maître Laperonnie pour quatre affaires différentes entre 2017 et 2022. C'est un avocat à l'écoute, bienveillant et empathique, des qualités rares de nos jours qui méritent d'être soulignées ! Il est également très professionnel, peu avare de son temps lors des rendez-vous ! Je le recommande vivement !!"
testi1_name: "Olivier Olivo"
testi1_role: "Avis Google · Local Guide"
testi2_text: "Maître Laperonnie est mon avocat depuis plusieurs années, très à l'écoute. Résultat satisfaisant quelque soit l'affaire. Je le conseille et l'ai déjà recommandé, autour de moi, plusieurs fois."
testi2_name: "Antonio Mendes"
testi2_role: "Avis Google"
testi3_text: "On ne peut que recommander Me Laperonnie — écoute, compétence +++, mise en confiance. Rarement vu un avocat avec autant de qualités humaines. Merci encore à lui."
testi3_name: "Chantal Fontaine"
testi3_role: "Avis Google"
