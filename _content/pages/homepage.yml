about_p1: "Maître **François-Xavier LAPERONNIE** est avocat inscrit au barreau depuis plus de dix-sept ans. Diplômé de l'École de Formation du Barreau de Paris, il a forgé une expertise de terrain au sein de cabinets reconnus avant de créer sa propre structure."
about_p2: "Son approche est fondée sur l'écoute, la rigueur et une **stratégie juridique sur mesure**. Chaque dossier est traité avec la plus grande attention, qu'il s'agisse d'un particulier, d'un chef d'entreprise ou d'une société de grande envergure."
about_p3: "Convaincu que le droit est avant tout un outil au service des personnes, il s'engage à apporter des **solutions concrètes, efficaces et adaptées** aux enjeux de ses clients — en toutes circonstances."

quote_text: "La justice n'est pas un droit acquis — elle se conquiert avec intelligence, méthode et un engagement sans faille envers ceux qui nous font confiance."

exp_penal_title: "Droit Pénal"
exp_penal_desc: "Défense pénale devant toutes les juridictions. Assistance dès la garde à vue, tout au long de l'instruction et jusqu'au jugement — une présence constante à chaque étape."
exp_penal_tags: "Crimes · Délits · Contraventions · Victimes · Appel"
exp_famille_title: "Droit de la Famille"
exp_famille_desc: "Accompagnement humain et rigoureux dans toutes les procédures familiales. Divorce, séparation, garde d'enfants, pension alimentaire, successions et régimes matrimoniaux."
exp_famille_tags: "Divorce · Garde · Succession · Adoption · PACS"
exp_crypto_title: "Cryptomonnaies"
exp_crypto_desc: "Expertise de pointe en droit des actifs numériques. Litiges liés aux cryptomonnaies, arnaques et fraudes blockchain, saisies d'actifs et contentieux avec les plateformes d'échange."
exp_crypto_tags: "Bitcoin · NFT · Fraudes · DeFi · Saisies numériques"

testi1_text: "Maître LAPERONNIE a assuré ma défense dans une affaire pénale particulièrement complexe. Sa maîtrise du dossier, son calme et sa rigueur en audience ont fait toute la différence. J'ai été acquitté. Je lui dois beaucoup."
testi1_name: "Thomas M."
testi1_role: "Affaire pénale — Cour d'appel de Paris"
testi2_text: "Dans une période de divorce très douloureuse, Maître LAPERONNIE a su allier professionnalisme et bienveillance. Il a protégé mes droits et ceux de mes enfants avec une détermination exemplaire. Je le recommande sans hésitation."
testi2_name: "Sophie L."
testi2_role: "Procédure de divorce — Garde d'enfants"
testi3_text: "J'ai perdu une somme importante suite à une arnaque sur une plateforme DeFi. Maître LAPERONNIE est l'un des rares avocats à réellement maîtriser ces enjeux. Il a su identifier les responsabilités et initier des démarches concrètes."
testi3_name: "Alexandre R."
testi3_role: "Fraude aux cryptomonnaies — DeFi"
