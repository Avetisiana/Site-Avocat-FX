hero_sub: "Accompagnement · Écoute · Résolution"
hero_title1: "Droit de"
hero_title2: "la Famille"
hero_tagline: "Un accompagnement humain et rigoureux dans toutes les procédures familiales, des plus simples aux plus complexes."

intro_heading1: "Le droit de la famille,"
intro_heading2: "avec humanité"
intro_p1: "Les procédures familiales touchent à ce que vous avez de plus précieux : votre famille, vos enfants, votre patrimoine. Maître LAPERONNIE vous accompagne avec **bienveillance et fermeté** pour défendre vos droits et ceux de vos proches, à Angoulême et dans toute la Charente."
intro_p2: "Chaque situation familiale est unique. Le cabinet propose une **approche sur mesure**, privilégiant la médiation et la résolution amiable lorsque cela est possible, et la défense contentieuse lorsque vos intérêts l'exigent."
intro_p3: "Qu'il s'agisse d'un divorce, d'une séparation difficile ou d'un litige successoral en Charente, Maître LAPERONNIE met son expertise au service de votre sérénité et de **l'intérêt supérieur de vos enfants**."

key1_title: "Priorité à l'enfant"
key1_desc: "L'intérêt supérieur de l'enfant guide chaque décision et chaque stratégie adoptée dans les procédures familiales."
key2_title: "Médiation & contentieux"
key2_desc: "Résolution amiable privilégiée dès que possible, défense contentieuse déterminée lorsqu'elle s'impose."
key3_title: "Accompagnement global"
key3_desc: "Du divorce à la succession, une assistance complète couvrant l'ensemble des situations familiales."

cta1_label: "Accompagnement familial"
cta1_heading1: "Votre famille traverse une épreuve ?"
cta1_heading2: "Nous sommes là pour vous."

services_heading1: "Quatre domaines de notre"
services_heading2: "expertise familiale"

svc1_title: "Divorce & séparation"
svc1_desc: "Divorce par consentement mutuel, divorce contentieux, séparation de corps : le cabinet vous assiste pour toutes les formes de dissolution du lien matrimonial, en préservant vos droits sur le patrimoine, le logement et la prestation compensatoire."
svc2_title: "Garde & résidence des enfants"
svc2_desc: "Résidence habituelle, garde alternée, droit de visite et d'hébergement : Maître LAPERONNIE défend une organisation fondée sur l'intérêt supérieur de l'enfant et adaptée à la réalité de votre vie familiale, en phase amiable comme contentieuse."
svc3_title: "Pension alimentaire"
svc3_desc: "Fixation, révision ou recouvrement de la pension alimentaire et de la prestation compensatoire : le cabinet calcule une contribution adaptée aux revenus et besoins de chacun, et engage les procédures de recouvrement en cas d'impayés."
svc4_title: "Successions & régimes matrimoniaux"
svc4_desc: "Liquidation du régime matrimonial, partage de la communauté, règlement des successions, contestation de testament : le cabinet protège vos droits patrimoniaux et résout les litiges entre héritiers avec rigueur et efficacité."

cta2_heading1: "Protégez vos droits"
cta2_heading2: "et ceux de vos enfants."

contact_heading1: "Votre situation familiale"
contact_heading2: "une écoute attentive"
contact_intro: "Chaque procédure familiale est sensible et personnelle. Contactez l'avocat spécialisé en droit de la famille à Angoulême pour une première consultation confidentielle, dans un cadre bienveillant et professionnel."
faq1_q: "Ai-je besoin d'un avocat pour divorcer ?"
faq1_a: "Oui, l'avocat est obligatoire dans toutes les procédures de divorce depuis la réforme de 2017. Chaque époux doit être représenté par son propre avocat."
faq2_q: "Combien de temps dure une procédure de divorce ?"
faq2_a: "Un divorce par consentement mutuel peut être finalisé en 1 à 3 mois. Un divorce contentieux dure en moyenne 12 à 24 mois selon la complexité du litige et le calendrier du Tribunal judiciaire d'Angoulême."
faq3_q: "Comment est fixée la garde des enfants ?"
faq3_a: "Le juge aux affaires familiales statue en priorité sur l'intérêt supérieur de l'enfant. Résidence principale ou alternée, droit de visite et d'hébergement : Maître LAPERONNIE vous aide à défendre la solution la plus favorable pour votre famille."
faq4_q: "La première consultation est-elle payante ?"
faq4_a: "Le premier entretien est confidentiel et sans engagement. Les honoraires sont discutés lors de cette rencontre, en toute transparence."
