hero_tagline: "L'expertise juridique au service des enjeux du numérique, de la blockchain et des actifs cryptographiques."

intro_heading1: "Le droit du numérique,"
intro_heading2: "une expertise rare"
intro_p1: "Les cryptomonnaies et les actifs numériques constituent un environnement juridique en pleine évolution, souvent mal maîtrisé par les praticiens du droit traditionnels. Maître LAPERONNIE a développé une **expertise de pointe** dans ce domaine en constante mutation."
intro_p2: "Qu'il s'agisse d'une arnaque à l'investissement, d'un litige avec une plateforme d'échange, d'une saisie d'actifs numériques ou d'un contentieux lié à la DeFi, le cabinet dispose des outils juridiques et techniques nécessaires pour **défendre vos intérêts efficacement**."
intro_p3: "Dans un secteur où les fraudeurs exploitent l'anonymat et la complexité technologique, agir vite et avec précision est déterminant. Le cabinet intervient en **urgence** dès la détection d'une fraude."

key1_title: "Expertise blockchain reconnue"
key1_desc: "Maîtrise technique et juridique des protocoles blockchain, smart contracts et actifs numériques."
key2_title: "Intervention en urgence"
key2_desc: "En cas de fraude ou d'arnaque, chaque heure compte. Le cabinet mobilise immédiatement les recours disponibles."
key3_title: "Dimension internationale"
key3_desc: "Les litiges crypto franchissent souvent les frontières. Le cabinet coordonne les procédures multi-juridictionnelles."

cta1_label: "Réagissez maintenant"
cta1_heading1: "Victime d'une arnaque crypto ?"
cta1_heading2: "Chaque heure compte."

services_heading1: "Quatre axes de notre"
services_heading2: "expertise numérique"

svc1_title: "Fraudes & arnaques aux cryptomonnaies"
svc1_desc: "Faux sites d'investissement, rug pulls, pump & dump, phishing : Maître LAPERONNIE identifie les responsables, dépose plainte auprès des autorités compétentes (OCLCTIC, AMF) et engage des procédures de saisie et de recouvrement des actifs volés."
svc2_title: "Litiges avec plateformes d'échange"
svc2_desc: "Blocage de compte, gel de fonds, refus de retrait, frais abusifs : le cabinet engage des procédures contre les exchanges centralisés (Binance, Coinbase, Kraken, etc.) et décentralisés pour obtenir la restitution de vos actifs et des dommages et intérêts."
svc3_title: "Saisie & recouvrement d'actifs numériques"
svc3_desc: "Maître LAPERONNIE maîtrise les procédures de saisie d'actifs numériques en France et à l'international, en coordination avec les autorités judiciaires et les prestataires de services sur actifs numériques (PSAN) pour tracer et récupérer des fonds détournés."
svc4_title: "DeFi, NFT & smart contracts"
svc4_desc: "Exploitation de faille dans un smart contract, vol de NFT, litige sur protocole DeFi : le cabinet analyse les aspects techniques et juridiques, identifie les recours disponibles et engage les actions appropriées en France et dans les juridictions étrangères concernées."

cta2_heading1: "Récupérez vos actifs"
cta2_heading2: "avec le bon avocat."

contact_heading1: "Victime d'une fraude"
contact_heading2: "aux cryptomonnaies ?"
contact_intro: "En matière de fraude aux actifs numériques, le temps est un facteur déterminant. Contactez le cabinet immédiatement pour une analyse confidentielle de votre situation."
