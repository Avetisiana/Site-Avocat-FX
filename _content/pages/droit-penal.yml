hero_sub: "Défense · Protection · Justice"
hero_title1: "Droit"
hero_title2: "Pénal"
hero_tagline: "Une défense rigoureuse à chaque étape de la procédure pénale — de la garde à vue jusqu'en appel."

intro_heading1: "Une défense pénale"
intro_heading2: "sans compromis"
intro_p1: "Que vous soyez mis en cause ou victime d'une infraction pénale, Maître LAPERONNIE vous assiste avec rigueur et détermination devant toutes les juridictions pénales — de Angoulême à la Cour d'assises de la Charente."
intro_p2: "La matière pénale exige une **réactivité immédiate** et une maîtrise totale du dossier. Chaque affaire est traitée avec la plus grande attention, du premier interrogatoire jusqu'au dernier recours, en garantissant la protection de vos droits fondamentaux à chaque instant."
intro_p3: "Fort de son expérience auprès du Tribunal correctionnel d'Angoulême et de la Cour d'appel de Bordeaux, Maître LAPERONNIE construit avec vous une **stratégie de défense sur mesure**, adaptée aux spécificités de chaque dossier."

key1_title: "Disponible dès la garde à vue"
key1_desc: "Intervention immédiate dès la première heure de privation de liberté, 7 jours sur 7."
key2_title: "Toutes juridictions"
key2_desc: "Tribunal correctionnel, Cour d'assises, Cour d'appel — une présence à chaque niveau de juridiction."
key3_title: "Victimes & mis en cause"
key3_desc: "Maître LAPERONNIE défend les deux côtés de la procédure pénale avec la même rigueur."

cta1_label: "Intervention immédiate"
cta1_heading1: "Mis en cause ou victime ?"
cta1_heading2: "Agissez sans attendre."

services_heading1: "Quatre piliers de notre"
services_heading2: "défense pénale"

svc1_title: "Assistance en garde à vue"
svc1_desc: "Dès la notification de la garde à vue, Maître LAPERONNIE intervient pour vous informer de vos droits, examiner les éléments à charge, vous conseiller avant et après les auditions, et veiller au strict respect des garanties procédurales."
svc2_title: "Instruction pénale"
svc2_desc: "Lors de la phase d'instruction, le cabinet intervient devant le juge d'instruction pour défendre vos intérêts : demandes d'actes, contestation des éléments à charge, demandes de mise en liberté et contrôle de la régularité de la procédure."
svc3_title: "Défense en jugement"
svc3_desc: "Devant le tribunal correctionnel ou la Cour d'assises, Maître LAPERONNIE construit une plaidoirie rigoureuse, analyse et conteste les preuves, interroge les témoins et défend vos intérêts avec conviction devant les magistrats."
svc4_title: "Assistance aux victimes"
svc4_desc: "Être victime d'une infraction nécessite un accompagnement dédié. Le cabinet dépose les plaintes, constitue partie civile, suit la procédure dans son intégralité et défend votre droit à réparation devant toutes les juridictions compétentes."

cta2_heading1: "Une défense pénale"
cta2_heading2: "commence par un appel."

contact_heading1: "Votre affaire pénale"
contact_heading2: "une réponse experte"
contact_intro: "Chaque situation pénale est unique et requiert une analyse immédiate. Consultez Maître LAPERONNIE, avocat pénaliste à Angoulême, pour une première consultation confidentielle."
