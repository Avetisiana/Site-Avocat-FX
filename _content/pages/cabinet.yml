bio_p1: "Maître **François-Xavier LAPERONNIE** est avocat inscrit au Barreau de la Charente depuis plus de dix-sept ans. Diplômé de l'École de Formation du Barreau de Paris, il a forgé son expertise au sein de cabinets parisiens reconnus avant de choisir Angoulême pour y créer sa propre structure."
bio_p2: "Son parcours l'a conduit à défendre aussi bien des **particuliers confrontés à des situations de crise** que des chefs d'entreprise et des sociétés exposés à des enjeux juridiques complexes. Cette double expérience nourrit une approche singulière : rigoureuse dans l'analyse, pragmatique dans la solution."
bio_p3: "Pionnier dans l'intégration du **droit des actifs numériques**, il est l'un des rares avocats de la région à maîtriser les dimensions juridiques des cryptomonnaies — fraudes, fiscalité, litiges blockchain — dans un environnement réglementaire en constante évolution."
bio_p4: "Convaincu que le droit est un outil au service des personnes, il s'engage à apporter des **solutions concrètes et adaptées** à chaque dossier, sans compromis sur la qualité ni sur la relation de confiance avec ses clients."

tl1_year: "2006"
tl1_title: "École de Formation du Barreau de Paris (EFB)"
tl1_desc: "Formation au Certificat d'Aptitude à la Profession d'Avocat (CAPA). Spécialisation en droit pénal et procédure pénale."
tl2_year: "2007"
tl2_title: "Prestation de serment — Barreau de Paris"
tl2_desc: "Début d'exercice au sein de cabinets parisiens spécialisés en défense pénale et contentieux civil. Prise en charge de dossiers de première instance et d'appel."
tl3_year: "2011"
tl3_title: "Élargissement au droit de la famille"
tl3_desc: "Développement d'une double compétence en droit de la famille : divorces contentieux et amiables, garde d'enfants, autorité parentale, successions familiales complexes."
tl4_year: "2014"
tl4_title: "Fondation du Cabinet LAPERONNIE à Angoulême"
tl4_desc: "Installation au Barreau de la Charente et ouverture du cabinet au 14 Rue d'Arcole, Angoulême. Développement d'une clientèle locale et régionale dans les trois domaines d'expertise."
tl5_year: "2019"
tl5_title: "Intégration du droit des cryptomonnaies"
tl5_desc: "Formation approfondie sur les actifs numériques et leur cadre juridique. Premiers dossiers de fraudes DeFi, de contentieux blockchain et d'accompagnement fiscal des détenteurs de cryptomonnaies."
tl6_year: "Auj."
tl6_title: "Cabinet de référence en Charente"
tl6_desc: "Plus de 2 500 dossiers traités, une réputation bâtie sur des résultats concrets et une présence aux côtés de chaque client, de la première consultation au verdict final."

val1_title: "Rigueur"
val1_desc: "Chaque argument est pesé, chaque pièce vérifiée. Une analyse exhaustive est la fondation de toute défense solide."
val2_title: "Confidentialité"
val2_desc: "Le secret professionnel est un pilier absolu. Vos informations sont traitées avec la plus stricte discrétion."
val3_title: "Engagement"
val3_desc: "Votre dossier n'est jamais un simple numéro. Nous nous investissons pleinement dans chaque affaire, sans exception."
val4_title: "Transparence"
val4_desc: "Vous êtes informé à chaque étape. Honoraires clairs, stratégie expliquée, résultats communiqués sans délai."

quote_text: "La justice n'est pas un droit acquis — elle se conquiert avec intelligence, méthode et un engagement sans faille envers ceux qui nous font confiance."

testi1_text: "J'ai fait appel à Maître Laperonnie pour quatre affaires différentes entre 2017 et 2022. C'est un avocat à l'écoute, bienveillant et empathique, des qualités rares de nos jours qui méritent d'être soulignées ! Il est également très professionnel, peu avare de son temps lors des rendez-vous ! Je le recommande vivement !!"
testi1_name: "Olivier Olivo"
testi1_role: "Avis Google · Local Guide"
